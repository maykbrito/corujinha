name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: typecheck + test
    # macOS runner: the app is mac-only, and the tests run under Electron's own Node
    # (ELECTRON_RUN_AS_NODE, ABI 148) — no headless-Linux GUI-lib setup needed.
    # Free minutes for public repos.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Run lifecycle scripts: postinstall (electron-builder install-app-deps) downloads
      # Electron and compiles better-sqlite3 for Electron's ABI (148) — the ABI the tests
      # now use by running vitest via `ELECTRON_RUN_AS_NODE=1 electron`.
      - run: npm ci

      - run: npm run typecheck

      - run: npm test
