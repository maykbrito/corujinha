name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Skip lifecycle scripts on install (avoids the Electron native rebuild in CI).
      # better-sqlite3 is rebuilt for Node by the test's own "pretest" hook.
      - run: npm ci --ignore-scripts

      - run: npm run typecheck

      - run: npm test
