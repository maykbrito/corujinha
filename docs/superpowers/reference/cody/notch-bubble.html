<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    @font-face {
      font-family: 'Material Icons';
      font-style: normal;
      font-weight: 400;
      font-display: block;
      src: url('./assets/fonts/MaterialIcons-Regular.ttf') format('truetype');
    }

    .material-icons {
      font-family: 'Material Icons';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      font-feature-settings: 'liga';
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* Single morphing shape — starts as notch pill, expands to panel */
    .notch-shape {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      --notch-background-opacity: 1;
      --notch-surface-rgb: 0, 0, 0;
      --notch-fade-rgb: 0, 0, 0;
      --notch-text-primary: rgba(255, 255, 255, 0.9);
      --notch-text-strong: #fff;
      --notch-text-secondary: rgba(255, 255, 255, 0.6);
      --notch-text-muted: rgba(255, 255, 255, 0.45);
      --notch-control-bg: rgba(255, 255, 255, 0.08);
      --notch-control-hover-bg: rgba(255, 255, 255, 0.16);
      --notch-control-border: rgba(255, 255, 255, 0.12);
      --notch-action-accent: #007AFF;
      --notch-action-accent-hover: #1A8AFF;
      --notch-action-text: #fff;
      background-color: rgba(var(--notch-surface-rgb), var(--notch-background-opacity));
      color: var(--notch-text-primary);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.72);
      overflow: hidden;
      display: flex;
      flex-direction: column;

      /* Collapsed = notch size */
      width: 300px;
      height: 34px;
      border-radius: 0 0 24px 24px;

      /* Smooth spring-like morph */
      transition:
        width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
        height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
        border-radius 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        background-color 0.16s ease;
    }

    .notch-shape.surface-theme-light {
      --notch-surface-rgb: 255, 255, 255;
      --notch-fade-rgb: 255, 255, 255;
      --notch-text-primary: rgba(0, 0, 0, 0.84);
      --notch-text-strong: rgba(0, 0, 0, 0.92);
      --notch-text-secondary: rgba(0, 0, 0, 0.62);
      --notch-text-muted: rgba(0, 0, 0, 0.45);
      --notch-control-bg: rgba(0, 0, 0, 0.05);
      --notch-control-hover-bg: rgba(0, 0, 0, 0.10);
      --notch-control-border: rgba(0, 0, 0, 0.12);
      text-shadow: none;
    }

    .notch-shape.expanded {
      width: var(--notch-expanded-width, 436px);
      /* height set dynamically via JS for content-wrap */
      border-radius: 0 0 20px 20px;
    }

    /* Floating state — all corners rounded when not pinned to notch */
    .notch-shape.floating {
      border-radius: 24px;
    }

    .notch-shape.floating.expanded {
      border-radius: 20px;
    }

    /* Visual feedback when dragging near the snap zone */
    .notch-shape.near-snap {
      box-shadow: 0 0 16px 2px rgba(255, 255, 255, 0.15);
    }

    /* During drag, disable morph transitions so position updates feel instant */
    .notch-shape.dragging,
    .notch-shape.resizing {
      transition: none !important;
    }

    /* ===== Header bar — always visible in the 34px collapsed area ===== */
    .notch-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
      pointer-events: auto !important;
      cursor: default;
    }

    .notch-logo {
      pointer-events: auto !important;
      cursor: default;
      display: flex;
      align-items: center;
      opacity: 0.9;
    }

    .notch-logo-image {
      width: 18px;
      height: 18px;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    .notch-logo-image.hidden {
      display: none;
    }

    .notch-header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      pointer-events: auto !important;
    }

    .notch-header-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      padding: 0;
      background: none;
      border: none;
      outline: none;
      pointer-events: auto !important;
      cursor: default;
      border-radius: 50%;
      transition: background 0.2s ease, opacity 0.2s ease;
    }

    .notch-header-btn .material-icons {
      font-size: 18px;
      color: var(--notch-text-secondary);
      pointer-events: none;
      transition: color 0.2s ease;
    }

    .notch-header-btn:hover {
      background: var(--notch-control-hover-bg);
    }

    .notch-header-btn:hover .material-icons {
      color: var(--notch-text-primary);
    }

    /* Capture progress indicator — visual only, does not affect native window shape */
    .notch-capture-indicator {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 31px;
      height: 2px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      z-index: 12;
      transition: opacity 0.16s ease;
    }

    .notch-capture-indicator::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 36%;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0),
        rgba(255, 221, 87, 0.9),
        rgba(255, 255, 255, 0)
      );
      transform: translateX(-130%);
      animation: notchCaptureSweep 1.05s ease-in-out infinite;
    }

    .notch-shape.capture-active .notch-capture-indicator {
      opacity: 1;
    }

    .notch-shape.capture-analyzing .notch-capture-indicator::before {
      animation-duration: 1.35s;
    }

    @keyframes notchCaptureSweep {
      0% { transform: translateX(-130%); }
      100% { transform: translateX(360%); }
    }

    /* Refresh button — hidden when collapsed, visible when expanded */
    .notch-header-btn.refresh {
      opacity: 0;
      pointer-events: none !important;
    }

    .notch-shape.expanded .notch-header-btn.refresh {
      opacity: 1;
      pointer-events: auto !important;
    }

    .notch-shape.collapsing .notch-header-btn.refresh {
      opacity: 0;
      transition: opacity 0.1s ease;
    }

    .notch-header-btn.refresh.spinning .material-icons {
      animation: spin 0.8s linear infinite;
      color: var(--notch-text-primary);
    }

    /* Font size buttons — hidden when collapsed, visible when expanded */
    .notch-font-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      padding: 0;
      background: none;
      border: none;
      outline: none;
      pointer-events: none !important;
      cursor: default;
      border-radius: 50%;
      transition: background 0.2s ease, opacity 0.2s ease;
      opacity: 0;
    }

    .notch-font-btn .font-label {
      color: var(--notch-text-secondary);
      font-weight: 600;
      line-height: 1;
      pointer-events: none;
      transition: color 0.2s ease;
    }

    .notch-font-btn .font-label-small {
      font-size: 10px;
    }

    .notch-font-btn .font-label-large {
      font-size: 15px;
    }

    .notch-shape.expanded .notch-font-btn {
      opacity: 1;
      pointer-events: auto !important;
    }

    .notch-shape.collapsing .notch-font-btn {
      opacity: 0;
      transition: opacity 0.1s ease;
    }

    .notch-font-btn:hover {
      background: var(--notch-control-hover-bg);
    }

    .notch-font-btn:hover .font-label {
      color: var(--notch-text-primary);
    }

    .notch-font-btn:disabled {
      opacity: 0.25 !important;
    }


    /* Inner content — fades in after shape expands */
    .notch-inner {
      padding: 38px 16px 18px 16px;
      opacity: 0;
      transform: translateY(-6px);
      transition:
        opacity 0.3s ease 0.25s,
        transform 0.3s ease 0.25s;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .notch-shape.expanded .notch-inner {
      opacity: 1;
      transform: translateY(0);
    }

    /* Collapse animation — smooth ease-out (no bounce) for the shape */
    .notch-shape.collapsing {
      transition:
        width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
        height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
        border-radius 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Collapse animation — reverse timing for inner content */
    .notch-shape.collapsing .notch-inner {
      opacity: 0;
      transform: translateY(-6px);
      transition:
        opacity 0.15s ease,
        transform 0.15s ease;
    }

    /* Content area wrapper — must participate in flex chain for scroll to work */
    #content-area {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #content-area::after {
      content: '';
      position: absolute;
      left: 0;
      right: 6px;
      bottom: 0;
      height: 38px;
      pointer-events: none;
      opacity: var(--content-bottom-fade-opacity, 0);
      background: linear-gradient(
        180deg,
        rgba(var(--notch-fade-rgb), 0),
        rgba(var(--notch-fade-rgb), 0.72) 62%,
        rgba(var(--notch-fade-rgb), 1)
      );
      transition: opacity 0.16s ease;
      z-index: 2;
    }

    .notch-shape.expanded #content-area.has-bottom-fade::after {
      --content-bottom-fade-opacity: var(--notch-background-opacity);
    }

    /* Content area */
    .notch-content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.5;
      color: var(--notch-text-primary);
      padding-bottom: 34px;
      scroll-padding-bottom: 34px;
    }

    .notch-content::-webkit-scrollbar {
      width: 4px;
    }

    .notch-content::-webkit-scrollbar-thumb {
      background: var(--notch-control-border);
      border-radius: 2px;
    }

    .notch-content p {
      margin: 4px 0;
    }

    .notch-content ul, .notch-content ol {
      margin: 4px 0;
      padding-left: 18px;
    }

    .notch-content li {
      margin: 2px 0;
    }

    .notch-content strong {
      color: var(--notch-text-strong);
      font-weight: 600;
    }

    .notch-content em {
      color: var(--notch-text-primary);
      font-style: italic;
    }

    .notch-content .notch-inline-green {
      color: #22c55e;
    }

    .notch-content code {
      background: var(--notch-control-bg);
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 12px;
      font-family: 'SF Mono', Menlo, monospace;
      color: var(--notch-text-primary);
    }

    .notch-content pre {
      background: var(--notch-control-bg);
      border: 1px solid var(--notch-control-border);
      border-radius: 6px;
      padding: 8px 10px;
      margin: 6px 0;
      overflow-x: auto;
    }

    .notch-content pre.notch-code-block {
      position: relative;
      tab-size: 2;
    }

    .notch-content pre.notch-code-block[data-language] {
      padding-top: 22px;
    }

    .notch-content pre.notch-code-block[data-language]::before {
      content: attr(data-language);
      position: absolute;
      top: 5px;
      right: 8px;
      font-size: 9px;
      line-height: 1;
      letter-spacing: 0;
      color: var(--notch-text-secondary);
      opacity: 0.72;
      font-family: 'SF Mono', Menlo, monospace;
      pointer-events: none;
    }

    .notch-content pre code {
      background: none;
      border-radius: 0;
      padding: 0;
      font-size: 11px;
      line-height: 1.4;
      white-space: pre;
    }

    .notch-content pre.notch-code-block code {
      display: block;
    }

    .notch-content blockquote {
      border-left: 2px solid var(--notch-control-border);
      padding-left: 10px;
      margin: 4px 0;
      color: var(--notch-text-secondary);
    }

    .notch-content h1, .notch-content h2, .notch-content h3 {
      color: var(--notch-text-strong);
      margin: 6px 0 4px;
      font-size: 13px;
      font-weight: 600;
    }

    .notch-follow-ups {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--notch-control-border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .notch-follow-up-header {
      display: block;
    }

    .notch-follow-up-label {
      display: none;
      font-size: 11px;
      font-weight: 600;
      color: var(--notch-text-secondary);
    }

    .notch-follow-up-trigger {
      width: 100%;
      min-height: 30px;
      min-width: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--notch-control-border);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--notch-text-secondary);
      background: var(--notch-control-bg);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      cursor: default;
      pointer-events: auto !important;
      transition: background 0.16s ease, color 0.16s ease, border-color 0.16s ease;
    }

    .notch-follow-up-trigger:hover:not(:disabled) {
      color: var(--notch-text-primary);
      background: var(--notch-control-hover-bg);
    }

    .notch-follow-up-trigger:disabled {
      opacity: 0.45;
    }

    .notch-follow-up-trigger .material-icons {
      font-size: 14px;
      pointer-events: none;
    }

    .notch-follow-up-trigger.loading .material-icons {
      animation: spin 0.9s linear infinite;
    }

    .notch-follow-up-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--notch-text-muted);
    }

    .notch-follow-up-status .material-icons {
      font-size: 13px;
      animation: spin 0.9s linear infinite;
    }

    .notch-follow-up-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .notch-follow-up-chip {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      border: 1px solid var(--notch-control-border);
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--notch-text-primary);
      background: var(--notch-control-bg);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.25;
      text-align: left;
      overflow-wrap: anywhere;
      cursor: default;
      pointer-events: auto !important;
      transition: background 0.16s ease, border-color 0.16s ease;
    }

    .notch-follow-up-chip:hover {
      background: var(--notch-control-hover-bg);
      border-color: var(--notch-text-muted);
    }

    .notch-follow-up-chip:disabled {
      opacity: 0.55;
    }

    .notch-follow-up-chip .material-icons {
      font-size: 13px;
      flex: 0 0 auto;
      animation: spin 0.9s linear infinite;
    }

    .notch-follow-up-chip span:last-child {
      min-width: 0;
    }

    /* Placeholder / loading states */
    .notch-placeholder {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 12px;
      color: var(--notch-text-muted);
    }

    .notch-placeholder .sparkle {
      font-size: 16px;
      color: #ffdd57;
      animation: sparkFloat 1.4s ease-in-out infinite;
    }

    @keyframes sparkFloat {
      0% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
      100% { transform: translateY(0); }
    }

    .notch-loading {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 12px;
      color: var(--notch-text-secondary);
    }

    .notch-loading .spinner {
      font-size: 14px;
      color: var(--notch-text-muted);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .notch-error {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 0;
      font-size: 12px;
      color: rgba(255, 138, 128, 0.9);
    }

    .notch-error .icon {
      font-size: 14px;
    }

    .notch-actionable-error {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 7px 0 4px;
    }

    .notch-actionable-error-header {
      display: flex;
      align-items: center;
      gap: 7px;
      color: rgba(255, 138, 128, 0.96);
    }

    .notch-actionable-error-header .material-icons {
      flex: 0 0 auto;
      font-size: 16px;
      pointer-events: none;
    }

    .notch-actionable-error-title {
      color: var(--notch-text-strong);
      font-size: 13px;
      font-weight: 650;
      line-height: 1.25;
    }

    .notch-actionable-error-message {
      color: var(--notch-text-secondary);
      font-size: 12px;
      line-height: 1.45;
    }

    .notch-actionable-error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-top: 2px;
      pointer-events: auto !important;
    }

    .notch-error-action {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border: 1px solid var(--notch-control-border);
      border-radius: 8px;
      background: var(--notch-control-bg);
      color: var(--notch-text-primary);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.2;
      cursor: default;
      pointer-events: auto !important;
      transition: background 0.16s ease, border-color 0.16s ease;
    }

    .notch-error-action:hover {
      background: var(--notch-control-hover-bg);
      border-color: var(--notch-text-muted);
    }

    .notch-error-action.primary {
      background: var(--notch-action-accent);
      border-color: var(--notch-action-accent);
      color: var(--notch-action-text);
    }

    .notch-error-action.primary:hover {
      background: var(--notch-action-accent-hover);
      border-color: var(--notch-action-accent-hover);
    }

    /* Collapse button — bottom-right of expanded panel */
    .collapse-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 50%;
      background: var(--notch-control-bg);
      border: 1px solid var(--notch-control-border);
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto !important;
      cursor: default;
      opacity: 0;
      transition: opacity 0.2s ease, background 0.2s ease;
    }

    .notch-shape.expanded .collapse-btn {
      opacity: 1;
    }

    .notch-shape.collapsing .collapse-btn {
      opacity: 0;
      transition: opacity 0.1s ease;
    }

    .collapse-btn:hover {
      background: var(--notch-control-hover-bg);
      border-color: var(--notch-control-border);
    }

    .collapse-btn .material-icons {
      font-size: 14px;
      color: var(--notch-text-secondary);
      pointer-events: none;
    }

    .collapse-btn:hover .material-icons {
      color: var(--notch-text-primary);
    }

    /* ===== Navigation bar — prev/next for insight history ===== */
    .notch-nav {
      position: absolute;
      bottom: 8px;
      left: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .notch-shape.expanded .notch-nav.visible {
      opacity: 1;
    }

    .notch-shape.collapsing .notch-nav {
      opacity: 0;
      transition: opacity 0.1s ease;
    }

    .notch-nav-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--notch-control-bg);
      border: 1px solid var(--notch-control-border);
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto !important;
      cursor: default;
      transition: background 0.2s ease;
      padding: 0;
    }

    .notch-nav-btn:hover:not(:disabled) {
      background: var(--notch-control-hover-bg);
      border-color: var(--notch-control-border);
    }

    .notch-nav-btn:disabled {
      opacity: 0.25;
    }

    .notch-nav-btn .material-icons {
      font-size: 14px;
      color: var(--notch-text-secondary);
      pointer-events: none;
    }

    .notch-nav-counter {
      font-size: 11px;
      color: var(--notch-text-muted);
      min-width: 32px;
      text-align: center;
    }

    /* ===== Settings panel ===== */
    .notch-settings {
      display: none;
      flex-direction: column;
      gap: 16px;
      padding: 4px 0;
    }

    .notch-settings.active {
      display: flex;
    }

    .notch-settings-loading {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 2px 0;
    }

    .notch-settings.labels-ready .notch-settings-loading {
      display: none;
    }

    .notch-settings-loading-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .notch-settings-loading-line {
      height: 10px;
      width: 58%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--notch-control-bg), var(--notch-control-hover-bg), var(--notch-control-bg));
      background-size: 180% 100%;
      animation: settingsSkeleton 1200ms ease-in-out infinite;
    }

    .notch-settings-loading-toggle {
      width: 38px;
      height: 22px;
      border-radius: 999px;
      background: var(--notch-control-bg);
    }

    .notch-settings-loading-slider {
      height: 4px;
      width: 100%;
      border-radius: 999px;
      background: var(--notch-control-bg);
    }

    .notch-settings-controls {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .notch-settings.labels-ready .notch-settings-controls {
      display: flex;
    }

    @keyframes settingsSkeleton {
      0% { background-position: 100% 0; }
      100% { background-position: -80% 0; }
    }

    /* Select / slider sections */
    .notch-settings-select-section,
    .notch-settings-slider-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .notch-settings-slider-label,
    .notch-settings-toggle-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--notch-text-secondary);
    }

    .notch-settings-mode-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .notch-response-language-select-wrap {
      position: relative;
      width: 100%;
    }

    .notch-response-language-select {
      width: 100%;
      height: 34px;
      -webkit-appearance: none;
      appearance: none;
      border: 0;
      border-radius: 8px;
      padding: 0 34px 0 10px;
      color: var(--notch-text-primary);
      background: var(--notch-control-bg);
      box-shadow: inset 0 0 0 1px var(--notch-control-border);
      font-size: 11px;
      font-weight: 600;
      outline: none;
      cursor: default;
      pointer-events: auto !important;
    }

    .notch-response-language-select:focus {
      box-shadow:
        inset 0 0 0 1px rgba(255, 221, 87, 0.72),
        0 0 0 2px rgba(255, 221, 87, 0.12);
    }

    .notch-response-language-select option,
    .notch-response-language-select optgroup {
      color: #111;
      background: #fff;
    }

    .notch-response-language-select-icon {
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--notch-text-secondary);
      pointer-events: none;
    }

    .notch-mode-group {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .notch-mode-option {
      min-width: 0;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      border: 0;
      border-radius: 8px;
      padding: 0 8px;
      color: var(--notch-text-secondary);
      background: var(--notch-control-bg);
      box-shadow: inset 0 0 0 1px var(--notch-control-border);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: default;
      pointer-events: auto !important;
      transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .notch-mode-option .material-icons {
      flex: 0 0 auto;
      font-size: 15px;
      line-height: 1;
    }

    .notch-mode-option .notch-mode-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .notch-mode-option.active {
      color: #111;
      background: rgba(255, 221, 87, 0.92);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .notch-shape.surface-theme-light .notch-mode-option.active {
      color: rgba(0, 0, 0, 0.86);
    }

    .notch-settings-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 24px;
    }

    .notch-settings-toggle {
      width: 38px;
      height: 22px;
      border: 0;
      border-radius: 999px;
      padding: 2px;
      background: var(--notch-control-bg);
      box-shadow: inset 0 0 0 1px var(--notch-control-border);
      cursor: default;
      pointer-events: auto !important;
      transition: background 160ms ease, box-shadow 160ms ease;
      flex: 0 0 auto;
    }

    .notch-settings-toggle-knob {
      display: block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
      transform: translateX(0);
      transition: transform 160ms ease, background 160ms ease;
    }

    .notch-shape.surface-theme-light .notch-settings-toggle-knob {
      background: rgba(0, 0, 0, 0.68);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
    }

    .notch-settings-toggle.active {
      background: rgba(255, 221, 87, 0.85);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .notch-settings-toggle.active .notch-settings-toggle-knob {
      transform: translateX(16px);
      background: #111;
    }

    .notch-sensitivity-slider,
    .notch-opacity-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--notch-control-border);
      outline: none;
      pointer-events: auto !important;
      cursor: default;
    }

    .notch-sensitivity-slider::-webkit-slider-thumb,
    .notch-opacity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255, 221, 87, 0.9);
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: default;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }

    .notch-sensitivity-labels,
    .notch-opacity-labels {
      display: flex;
      justify-content: space-between;
    }

    .notch-sensitivity-labels span,
    .notch-opacity-labels span {
      font-size: 10px;
      color: var(--notch-text-muted);
    }

    /* ===== Resize handles ===== */
    .notch-resize-handle {
      position: absolute;
      z-index: 30;
      opacity: 0;
      pointer-events: none !important;
      cursor: default;
      transition: opacity 0.16s ease;
    }

    .notch-shape.expanded .notch-resize-handle {
      opacity: 1;
      pointer-events: auto !important;
    }

    .notch-shape.collapsing .notch-resize-handle {
      opacity: 0;
      pointer-events: none !important;
    }

    .notch-resize-handle-right {
      top: 44px;
      right: 0;
      bottom: 44px;
      width: 12px;
    }

    .notch-resize-handle-right::after {
      content: '';
      position: absolute;
      top: 50%;
      right: 4px;
      width: 2px;
      height: 40px;
      border-radius: 999px;
      background: var(--notch-control-border);
      transform: translateY(-50%);
    }

    .notch-resize-handle-bottom {
      left: 48px;
      right: 48px;
      bottom: 0;
      height: 12px;
    }

    .notch-resize-handle-bottom::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 4px;
      width: 46px;
      height: 2px;
      border-radius: 999px;
      background: var(--notch-control-border);
      transform: translateX(-50%);
    }

    .notch-resize-handle:hover::after,
    .notch-shape.resizing .notch-resize-handle::after {
      background: var(--notch-text-muted);
    }

    /* Reading mode: keep controls out of the way until the user hovers the Notch. */
    .notch-header-actions,
    .collapse-btn,
    .notch-nav,
    .notch-shape.expanded .collapse-btn,
    .notch-shape.expanded .notch-nav.visible,
    .notch-shape.expanded .notch-resize-handle {
      opacity: 0;
      pointer-events: none !important;
    }

    .notch-header-actions,
    .collapse-btn,
    .notch-nav,
    .notch-resize-handle {
      transition:
        opacity 0.18s ease,
        background 0.2s ease,
        border-color 0.2s ease;
    }

    .notch-shape.hovering .notch-header-actions,
    .notch-shape.dragging .notch-header-actions,
    .notch-shape.resizing .notch-header-actions {
      opacity: 1;
      pointer-events: auto !important;
    }

    .notch-shape.expanded.hovering .collapse-btn,
    .notch-shape.expanded.dragging .collapse-btn,
    .notch-shape.expanded.resizing .collapse-btn {
      opacity: 1;
      pointer-events: auto !important;
    }

    .notch-shape.expanded.hovering .notch-nav.visible,
    .notch-shape.expanded.dragging .notch-nav.visible,
    .notch-shape.expanded.resizing .notch-nav.visible {
      opacity: 1;
      pointer-events: auto !important;
    }

    .notch-shape.expanded.hovering .notch-resize-handle,
    .notch-shape.expanded.resizing .notch-resize-handle {
      opacity: 1;
      pointer-events: auto !important;
    }
  </style>
</head>
<body>
  <div class="notch-shape" id="notch">
    <!-- Header bar — always visible in collapsed pill -->
    <div class="notch-header">
      <div class="notch-logo">
        <img class="notch-logo-image" id="notch-brand-icon" alt="" aria-hidden="true">
      </div>
      <div class="notch-header-actions">
        <button class="notch-font-btn" id="font-decrease-btn">
          <span class="font-label font-label-small">A</span>
        </button>
        <button class="notch-font-btn" id="font-increase-btn">
          <span class="font-label font-label-large">A</span>
        </button>
        <button class="notch-header-btn refresh" id="refresh-btn">
          <span class="material-icons">refresh</span>
        </button>
        <button class="notch-header-btn" id="gear-btn">
          <span class="material-icons">settings</span>
        </button>
      </div>
    </div>
    <div class="notch-capture-indicator" id="capture-indicator" aria-hidden="true"></div>
    <div class="notch-inner" id="inner">
      <!-- Content view (insights content) -->
      <div id="content-area">
        <div class="notch-placeholder">
          <span class="material-icons sparkle">auto_awesome</span>
          <span>Realtime insights</span>
        </div>
      </div>

      <!-- Settings view -->
      <div class="notch-settings" id="settings-panel">
        <div class="notch-settings-loading" id="settings-loading" aria-hidden="true">
          <div class="notch-settings-loading-row">
            <div class="notch-settings-loading-line"></div>
            <div class="notch-settings-loading-toggle"></div>
          </div>
          <div class="notch-settings-loading-line"></div>
          <div class="notch-settings-loading-slider"></div>
          <div class="notch-settings-loading-line"></div>
          <div class="notch-settings-loading-slider"></div>
        </div>
        <div class="notch-settings-controls" id="settings-controls" aria-hidden="true">
          <div class="notch-settings-mode-section">
            <span class="notch-settings-slider-label" id="settings-mode-label"></span>
            <div class="notch-mode-group" id="notch-mode-group" role="radiogroup" aria-labelledby="settings-mode-label">
              <button class="notch-mode-option" type="button" data-mode="only_questions" role="radio" aria-checked="false">
                <span class="material-icons">help_outline</span>
                <span class="notch-mode-text" data-mode-label="only_questions"></span>
              </button>
              <button class="notch-mode-option" type="button" data-mode="moderate" role="radio" aria-checked="false">
                <span class="material-icons">chat_bubble_outline</span>
                <span class="notch-mode-text" data-mode-label="moderate"></span>
              </button>
              <button class="notch-mode-option" type="button" data-mode="proactive" role="radio" aria-checked="false">
                <span class="material-icons">auto_awesome</span>
                <span class="notch-mode-text" data-mode-label="proactive"></span>
              </button>
              <button class="notch-mode-option" type="button" data-mode="full_power" role="radio" aria-checked="false">
                <span class="material-icons">bolt</span>
                <span class="notch-mode-text" data-mode-label="full_power"></span>
              </button>
            </div>
          </div>
          <div class="notch-settings-select-section">
            <label class="notch-settings-slider-label" id="settings-response-language-label" for="response-language-select"></label>
            <div class="notch-response-language-select-wrap">
              <select class="notch-response-language-select" id="response-language-select" aria-labelledby="settings-response-language-label"></select>
              <span class="material-icons notch-response-language-select-icon">expand_more</span>
            </div>
          </div>
          <div class="notch-settings-slider-section">
            <span class="notch-settings-slider-label" id="settings-transparency-label"></span>
            <input type="range" class="notch-opacity-slider" id="transparency-slider" min="0.45" max="1" step="0.05" value="1">
            <div class="notch-opacity-labels">
              <span id="transparency-low-label"></span>
              <span id="transparency-high-label"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="notch-nav" id="nav-bar">
      <button class="notch-nav-btn" id="nav-prev" disabled>
        <span class="material-icons">chevron_left</span>
      </button>
      <span class="notch-nav-counter" id="nav-counter">1 / 1</span>
      <button class="notch-nav-btn" id="nav-next" disabled>
        <span class="material-icons">chevron_right</span>
      </button>
    </div>
    <button class="collapse-btn" id="collapse-btn">
      <span class="material-icons">expand_less</span>
    </button>
    <div class="notch-resize-handle notch-resize-handle-right" id="resize-width-handle"></div>
    <div class="notch-resize-handle notch-resize-handle-bottom" id="resize-height-handle"></div>
  </div>

  <script>
    const notch = document.getElementById('notch');
    const inner = document.getElementById('inner');
    const contentArea = document.getElementById('content-area');
    const settingsPanel = document.getElementById('settings-panel');
    const refreshBtn = document.getElementById('refresh-btn');
    const gearBtn = document.getElementById('gear-btn');
    const collapseBtn = document.getElementById('collapse-btn');
    const transparencySlider = document.getElementById('transparency-slider');
    const responseLanguageSelect = document.getElementById('response-language-select');
    const modeButtons = Array.from(document.querySelectorAll('.notch-mode-option'));
    const settingsControls = document.getElementById('settings-controls');
    const navBar = document.getElementById('nav-bar');
    const navPrev = document.getElementById('nav-prev');
    const navNext = document.getElementById('nav-next');
    const navCounter = document.getElementById('nav-counter');
    const fontDecreaseBtn = document.getElementById('font-decrease-btn');
    const fontIncreaseBtn = document.getElementById('font-increase-btn');
    const resizeWidthHandle = document.getElementById('resize-width-handle');
    const resizeHeightHandle = document.getElementById('resize-height-handle');
    const notchBrandIcon = document.getElementById('notch-brand-icon');
    const labels = {
      realtimeInsights: 'Realtime insights',
      notchMode: 'Notch mode',
      modeOnlyQuestions: 'Only Questions',
      modeModerate: 'Moderate',
      modeProactive: 'Proactive',
      modeFullPower: 'Full Power',
      responseLanguage: 'Enforce response language to',
      responseLanguageMostUsed: 'Most Used',
      responseLanguageAllLanguages: 'All Languages',
      notchTransparency: 'Notch transparency',
      transparencyLow: 'Transparent',
      transparencyHigh: 'Opaque',
      generatingInsights: 'Generating insights...',
      followUp: 'Follow-up',
      loadFollowUps: 'Load follow-ups',
      loadingFollowUps: 'Loading...',
      generatingFollowUps: 'Generating questions...',
      resizeWidth: 'Resize Notch width',
      resizeHeight: 'Resize Notch height',
      errorFallback: 'Something went wrong',
    };

    let brandIconRequestId = 0;
    let flavorFeatures = {
      fastFirstInsight: false,
    };

    async function applyBrandIcon() {
      if (!notchBrandIcon) return;

      const requestId = ++brandIconRequestId;
      let brand = null;
      try {
        brand = await window.notchAPI?.getBrand?.();
      } catch (e) {
        brand = null;
      }
      if (requestId !== brandIconRequestId) return;

      if (!brand?.iconUrl) {
        notchBrandIcon.classList.add('hidden');
        return;
      }

      notchBrandIcon.alt = brand.name || '';
      notchBrandIcon.src = brand.iconUrl;
      notchBrandIcon.classList.remove('hidden');
      if (brand?.theme?.actionAccent) {
        notch.style.setProperty('--notch-action-accent', brand.theme.actionAccent);
      }
      if (brand?.theme?.actionAccentHover) {
        notch.style.setProperty('--notch-action-accent-hover', brand.theme.actionAccentHover);
      }
      if (brand?.theme?.actionAccentText) {
        notch.style.setProperty('--notch-action-text', brand.theme.actionAccentText);
      }
    }

    notchBrandIcon?.addEventListener('error', function() {
      notchBrandIcon.classList.add('hidden');
    });

    applyBrandIcon();

    async function applyFlavorFeatures() {
      try {
        const features = await window.notchAPI?.getFlavorFeatures?.();
        flavorFeatures = {
          fastFirstInsight: features?.fastFirstInsight === true,
        };
      } catch (e) {
        flavorFeatures = {
          fastFirstInsight: false,
        };
      }
    }

    applyFlavorFeatures();

    // State machine: collapsed | expanding | expanded | collapsing
    let state = 'collapsed';
    // Track whether the user manually collapsed — suppresses auto-expand on new data
    let userCollapsed = false;
    // Keep a new session as the pill until there is useful content to reveal.
    let initialSessionCollapsed = true;
    // Pinned = at the original notch position; floating = user-dragged elsewhere
    let pinned = true;

    // Expanded panel size (persisted in localStorage)
    const NOTCH_SIZE_STORAGE_KEY = 'notchBubbleSize';
    const NOTCH_OPACITY_STORAGE_KEY = 'notchBubbleOpacity';
    const DEFAULT_EXPANDED_WIDTH = 436;
    const DEFAULT_EXPANDED_HEIGHT = 212;
    const MIN_EXPANDED_WIDTH = 360;
    const MAX_EXPANDED_WIDTH = 900;
    const MIN_EXPANDED_HEIGHT = 160;
    const MAX_EXPANDED_HEIGHT = 640;
    const DEFAULT_NOTCH_OPACITY = 1;
    const MIN_NOTCH_OPACITY = 0.45;
    const MAX_NOTCH_OPACITY = 1;
    let hasManualNotchSize = false;
    let notchSize = {
      width: DEFAULT_EXPANDED_WIDTH,
      height: DEFAULT_EXPANDED_HEIGHT,
    };
    let notchOpacity = DEFAULT_NOTCH_OPACITY;

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function getResponsiveMaxWidth() {
      return Math.max(MIN_EXPANDED_WIDTH, Math.min(MAX_EXPANDED_WIDTH, window.screen.availWidth - 80));
    }

    function getResponsiveMaxHeight() {
      return Math.max(MIN_EXPANDED_HEIGHT, Math.min(MAX_EXPANDED_HEIGHT, window.screen.availHeight - 80));
    }

    function sanitizeNotchSize(size) {
      return {
        width: clamp(Math.round(size.width || DEFAULT_EXPANDED_WIDTH), MIN_EXPANDED_WIDTH, getResponsiveMaxWidth()),
        height: clamp(Math.round(size.height || DEFAULT_EXPANDED_HEIGHT), MIN_EXPANDED_HEIGHT, getResponsiveMaxHeight()),
      };
    }

    function loadSavedNotchSize() {
      try {
        const saved = localStorage.getItem(NOTCH_SIZE_STORAGE_KEY);
        if (!saved) return;
        const parsed = JSON.parse(saved);
        if (!parsed || !Number.isFinite(parsed.width) || !Number.isFinite(parsed.height)) return;
        notchSize = sanitizeNotchSize(parsed);
        hasManualNotchSize = true;
      } catch (e) { /* ignore */ }
    }

    function saveNotchSize() {
      try {
        localStorage.setItem(NOTCH_SIZE_STORAGE_KEY, JSON.stringify(notchSize));
      } catch (e) { /* ignore */ }
    }

    function sanitizeNotchOpacity(value) {
      const parsed = parseFloat(value);
      if (!Number.isFinite(parsed)) return DEFAULT_NOTCH_OPACITY;
      return clamp(parsed, MIN_NOTCH_OPACITY, MAX_NOTCH_OPACITY);
    }

    function loadSavedNotchOpacity() {
      try {
        const saved = localStorage.getItem(NOTCH_OPACITY_STORAGE_KEY);
        if (saved == null) return;
        notchOpacity = sanitizeNotchOpacity(saved);
      } catch (e) { /* ignore */ }
    }

    function saveNotchOpacity() {
      try {
        localStorage.setItem(NOTCH_OPACITY_STORAGE_KEY, notchOpacity.toString());
      } catch (e) { /* ignore */ }
    }

    function applyNotchOpacity() {
      notchOpacity = sanitizeNotchOpacity(notchOpacity);
      notch.style.setProperty('--notch-background-opacity', notchOpacity.toString());
      transparencySlider.value = notchOpacity.toString();
    }

    // Windows uses BrowserWindow.setShape() for native pass-through outside
    // the visible pill/panel. Keep the native hit-test shape synced with the
    // morphing DOM bounds instead of relying on forwarded mouse events.
    let notchShapeRAF = null;
    let notchShapeBurstRAF = null;
    let notchShapeBurstUntil = 0;

    function canSyncNotchShape() {
      return !!(window.notchAPI && typeof window.notchAPI.setShape === 'function');
    }

    function getNotchShapeRect() {
      const rect = notch.getBoundingClientRect();
      if (rect.width < 1 || rect.height < 1) return null;

      return {
        x: Math.max(0, Math.floor(rect.left)),
        y: Math.max(0, Math.floor(rect.top)),
        width: Math.ceil(rect.width),
        height: Math.ceil(rect.height),
      };
    }

    function syncNotchWindowShape() {
      notchShapeRAF = null;
      if (!canSyncNotchShape()) return;

      const rect = getNotchShapeRect();
      window.notchAPI.setShape(rect ? [rect] : null);
    }

    function scheduleNotchWindowShapeSync() {
      if (!canSyncNotchShape() || notchShapeRAF !== null) return;
      let ranSynchronously = false;
      const frameId = requestAnimationFrame(function() {
        ranSynchronously = true;
        syncNotchWindowShape();
      });
      if (!ranSynchronously) {
        notchShapeRAF = frameId;
      }
    }

    function startNotchWindowShapeBurst(durationMs) {
      if (!canSyncNotchShape()) return;
      const now = performance.now();
      notchShapeBurstUntil = Math.max(notchShapeBurstUntil, now + (durationMs || 700));

      if (notchShapeBurstRAF !== null) return;
      let completedSynchronously = false;
      const tick = () => {
        syncNotchWindowShape();
        if (performance.now() < notchShapeBurstUntil) {
          let ranSynchronously = false;
          const frameId = requestAnimationFrame(function() {
            ranSynchronously = true;
            tick();
          });
          if (!ranSynchronously) {
            notchShapeBurstRAF = frameId;
          }
        } else {
          notchShapeBurstRAF = null;
          completedSynchronously = true;
        }
      };
      const frameId = requestAnimationFrame(tick);
      if (!completedSynchronously) {
        notchShapeBurstRAF = frameId;
      }
    }

    function applyNotchSize(syncWindow) {
      notchSize = sanitizeNotchSize(notchSize);
      notch.style.setProperty('--notch-expanded-width', notchSize.width + 'px');
      if ((state === 'expanded' || state === 'expanding') && hasManualNotchSize) {
        notch.style.height = notchSize.height + 'px';
      }
      if (syncWindow && window.notchAPI?.resizeWindow) {
        window.notchAPI.resizeWindow(notchSize.width, notchSize.height);
      }
      startNotchWindowShapeBurst(300);
    }

    loadSavedNotchSize();
    loadSavedNotchOpacity();
    applyNotchSize(hasManualNotchSize);
    applyNotchOpacity();

    // ===== Drag-to-move logic =====
    let isDragging = false;
    let dragStartScreenX = 0;
    let dragStartScreenY = 0;
    let dragStartWinX = 0;
    let dragStartWinY = 0;
    let notchOriginX = 0;
    let notchOriginY = 0;
    const SNAP_DISTANCE = 150; // px threshold to snap back to notch position
    // We need a small movement threshold before entering drag mode
    // to avoid accidental drags on click
    const DRAG_THRESHOLD = 4;
    let dragPending = false;
    let dragReady = false; // true once we have the initial window position
    let isResizing = false;

    // Refresh the snap target from main process
    function refreshNotchOrigin() {
      if (window.notchAPI) {
        window.notchAPI.getNotchPosition().then(function(pos) {
          notchOriginX = pos.x;
          notchOriginY = pos.y;
        });
      }
    }

    // Cache the notch origin position on load
    refreshNotchOrigin();

    function updateFloatingClass() {
      if (pinned) {
        notch.classList.remove('floating');
      } else {
        notch.classList.add('floating');
      }
    }

    function distanceToNotch(winX, winY) {
      const dx = winX - notchOriginX;
      const dy = winY - notchOriginY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function setNotchHovering(isHovering) {
      notch.classList.toggle('hovering', !!isHovering);
    }

    function isPointerInsideNotch(e) {
      const rect = notch.getBoundingClientRect();
      return e.clientX >= rect.left && e.clientX <= rect.right &&
             e.clientY >= rect.top && e.clientY <= rect.bottom;
    }

    function restoreClickThroughIfPointerOutside(e) {
      const pointerInside = isPointerInsideNotch(e);
      if (!pointerInside) {
        setNotchHovering(false);
      }
      if (!pointerInside && window.notchAPI) {
        window.notchAPI.setIgnoreMouseEvents(true, { forward: true });
      }
    }

    window.addEventListener('resize', scheduleNotchWindowShapeSync);
    notch.addEventListener('transitionrun', () => startNotchWindowShapeBurst(750));
    notch.addEventListener('transitionstart', () => startNotchWindowShapeBurst(750));
    notch.addEventListener('transitionend', scheduleNotchWindowShapeSync);
    scheduleNotchWindowShapeSync();

    // Header is the drag handle
    const notchHeader = document.querySelector('.notch-header');

    notchHeader.addEventListener('mousedown', function(e) {
      // Only left mouse button; ignore clicks on buttons inside the header
      if (e.button !== 0) return;
      if (e.target.closest('.notch-header-btn') || e.target.closest('.notch-font-btn') || e.target.closest('.notch-header-actions')) return;

      dragPending = true;
      dragReady = false;
      dragStartScreenX = e.screenX;
      dragStartScreenY = e.screenY;

      // Refresh snap target in case display bounds changed
      refreshNotchOrigin();

      // Ensure mouse events are captured during drag
      if (window.notchAPI) {
        window.notchAPI.setIgnoreMouseEvents(false);
        window.notchAPI.getWindowPosition().then(function(pos) {
          if (!pos) { dragPending = false; return; }
          dragStartWinX = pos.x;
          dragStartWinY = pos.y;
          dragReady = true;
        });
      }

      e.preventDefault();
    });

    // Throttle move IPC to once per animation frame
    let dragRAF = null;

    document.addEventListener('mousemove', function(e) {
      if (!dragPending && !isDragging) return;
      // Don't start moving until we have the window position from IPC
      if (!dragReady) return;

      const dx = e.screenX - dragStartScreenX;
      const dy = e.screenY - dragStartScreenY;

      // Check if we've exceeded the drag threshold
      if (dragPending && !isDragging) {
        if (Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;
        // Start actual drag
        isDragging = true;
        dragPending = false;
        notch.classList.add('dragging');
      }

      if (!isDragging) return;

      const newX = dragStartWinX + dx;
      const newY = dragStartWinY + dy;

      // Coalesce move calls to one per frame to avoid IPC flood
      if (dragRAF) cancelAnimationFrame(dragRAF);
      dragRAF = requestAnimationFrame(function() {
        if (window.notchAPI) {
          window.notchAPI.moveWindow(newX, newY);
        }
        dragRAF = null;
      });

      // Visual feedback: near-snap indicator
      if (distanceToNotch(newX, newY) <= SNAP_DISTANCE) {
        notch.classList.add('near-snap');
      } else {
        notch.classList.remove('near-snap');
      }
    });

    document.addEventListener('mouseup', function(e) {
      if (dragPending) {
        dragPending = false;
        restoreClickThroughIfPointerOutside(e);
        return;
      }
      if (!isDragging) return;
      isDragging = false;
      notch.classList.remove('dragging');
      notch.classList.remove('near-snap');

      const dx = e.screenX - dragStartScreenX;
      const dy = e.screenY - dragStartScreenY;
      const finalX = dragStartWinX + dx;
      const finalY = dragStartWinY + dy;

      if (distanceToNotch(finalX, finalY) <= SNAP_DISTANCE) {
        // Snap back to notch origin
        pinned = true;
        if (window.notchAPI) {
          window.notchAPI.moveWindow(notchOriginX, notchOriginY);
          window.notchAPI.setPinned(true);
        }
      } else {
        // Stay at dropped position
        pinned = false;
        if (window.notchAPI) {
          window.notchAPI.setPinned(false);
        }
      }
      updateFloatingClass();

      // Restore click-through only if the pointer ended outside the notch.
      // If still hovering, keep interaction enabled so buttons remain clickable.
      restoreClickThroughIfPointerOutside(e);
    });

    // ===== Resize logic =====
    let resizeMode = null;
    let resizeStartScreenX = 0;
    let resizeStartScreenY = 0;
    let resizeStartWidth = 0;
    let resizeStartHeight = 0;
    let resizeRAF = null;

    function beginResize(mode, e) {
      if (e.button !== 0) return;
      if (state !== 'expanded') return;

      resizeMode = mode;
      isResizing = true;
      resizeStartScreenX = e.screenX;
      resizeStartScreenY = e.screenY;
      resizeStartWidth = notchSize.width;
      resizeStartHeight = notchSize.height;
      hasManualNotchSize = true;
      notch.classList.add('resizing');

      if (window.notchAPI) {
        window.notchAPI.setIgnoreMouseEvents(false);
      }

      e.preventDefault();
      e.stopPropagation();
    }

    function syncResizeWindow() {
      if (resizeRAF) cancelAnimationFrame(resizeRAF);
      resizeRAF = requestAnimationFrame(function() {
        applyNotchSize(true);
        resizeRAF = null;
      });
    }

    function updateResize(e) {
      if (!isResizing) return;

      const dx = e.screenX - resizeStartScreenX;
      const dy = e.screenY - resizeStartScreenY;
      const nextSize = {
        width: resizeStartWidth,
        height: resizeStartHeight,
      };

      if (resizeMode === 'width') {
        // Pinned resizing keeps the notch centered, so both sides expand.
        nextSize.width = resizeStartWidth + (pinned ? dx * 2 : dx);
      } else if (resizeMode === 'height') {
        nextSize.height = resizeStartHeight + dy;
      }

      notchSize = sanitizeNotchSize(nextSize);
      applyNotchSize(false);
      syncResizeWindow();
      e.preventDefault();
    }

    function endResize(e) {
      if (!isResizing) return;
      isResizing = false;
      resizeMode = null;
      notch.classList.remove('resizing');
      saveNotchSize();
      if (resizeRAF) {
        cancelAnimationFrame(resizeRAF);
        resizeRAF = null;
      }
      applyNotchSize(true);

      restoreClickThroughIfPointerOutside(e);
    }

    resizeWidthHandle.addEventListener('mousedown', function(e) {
      beginResize('width', e);
    });

    resizeHeightHandle.addEventListener('mousedown', function(e) {
      beginResize('height', e);
    });

    document.addEventListener('mousemove', updateResize);
    document.addEventListener('mouseup', endResize);

    // View mode: 'content' | 'settings'
    let viewMode = 'content';

    // Font scale state (persisted in localStorage)
    let fontScale = 1.0;
    try {
      const saved = localStorage.getItem('notchFontScale');
      if (saved) {
        const parsed = parseFloat(saved);
        if (Number.isFinite(parsed)) fontScale = Math.min(Math.max(parsed, 0.7), 1.6);
      }
    } catch (e) { /* ignore */ }

    function applyFontScale() {
      const contentEl = contentArea.querySelector('.notch-content');
      if (contentEl) contentEl.style.zoom = fontScale;
      fontDecreaseBtn.disabled = fontScale <= 0.7;
      fontIncreaseBtn.disabled = fontScale >= 1.6;
    }

    fontDecreaseBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      fontScale = Math.max(Math.round((fontScale - 0.1) * 10) / 10, 0.7);
      try { localStorage.setItem('notchFontScale', fontScale.toString()); } catch (e) { /* ignore */ }
      applyFontScale();
      if (state === 'expanded' && viewMode === 'content') {
        requestAnimationFrame(function() { updateExpandedHeight(); });
      }
    });

    fontIncreaseBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      fontScale = Math.min(Math.round((fontScale + 0.1) * 10) / 10, 1.6);
      try { localStorage.setItem('notchFontScale', fontScale.toString()); } catch (e) { /* ignore */ }
      applyFontScale();
      if (state === 'expanded' && viewMode === 'content') {
        requestAnimationFrame(function() { updateExpandedHeight(); });
      }
    });

    // Insight history navigation
    const history = [];
    const historyScrollPositions = [];
    const historyFollowUps = [];
    const FOLLOW_UP_ANSWER_SOURCE = 'notch-followup';
    let historyIndex = -1;
    // When the user clicks refresh, the next completed insight should jump to latest
    // even if they've navigated back — refresh is an explicit "show me a new one" action.
    let pendingRefreshJump = false;

    // Settings state (synced from main app)
    let notchMode = 'proactive';
    let surfaceTheme = 'dark';
    let renderedMode = 'placeholder';
    let renderedSummary = '';
    let renderedErrorActions = [];

    function normalizeSurfaceTheme(value) {
      return value === 'light' ? 'light' : 'dark';
    }

    function applySurfaceTheme(value) {
      surfaceTheme = normalizeSurfaceTheme(value);
      notch.classList.toggle('surface-theme-light', surfaceTheme === 'light');
      notch.classList.toggle('surface-theme-dark', surfaceTheme !== 'light');
    }

    applySurfaceTheme(surfaceTheme);

    function isViewingLatest() {
      return historyIndex >= history.length - 1;
    }

    function normalizeNotchMode(value) {
      return (
        value === 'only_questions' ||
        value === 'moderate' ||
        value === 'proactive' ||
        value === 'full_power'
      ) ? value : 'proactive';
    }

    function updateNavUI() {
      const total = history.length;
      const current = historyIndex + 1;
      if (total > 1 && viewMode === 'content') {
        navBar.classList.add('visible');
        navCounter.textContent = current + ' / ' + total;
        navPrev.disabled = historyIndex <= 0;
        navNext.disabled = historyIndex >= total - 1;
      } else {
        navBar.classList.remove('visible');
      }
    }

    function createFollowUpState(overrides) {
      return {
        suggestions: [],
        isLoading: false,
        error: null,
        answerLoadingIndex: -1,
        ...(overrides || {}),
      };
    }

    function normalizeFollowUps(followUps) {
      const source = Array.isArray(followUps) ? followUps : [];
      return source.map(function(item) {
        const text = typeof item?.text === 'string' ? item.text.trim() : '';
        const prompt = typeof item?.prompt === 'string' ? item.prompt.trim() : '';
        return { text, prompt };
      }).filter(function(item) {
        return item.text && item.prompt;
      });
    }

    function getHistoryFollowUpState(index) {
      if (index < 0) return createFollowUpState();
      if (!historyFollowUps[index]) {
        historyFollowUps[index] = createFollowUpState();
      }
      return historyFollowUps[index];
    }

    function findHistoryIndexForSummary(summary) {
      if (typeof summary !== 'string' || !summary) return -1;
      for (let i = history.length - 1; i >= 0; i--) {
        if (history[i] === summary) return i;
      }
      return -1;
    }

    function getFollowUpStateForSummary(summary) {
      const index = findHistoryIndexForSummary(summary);
      return index >= 0 ? getHistoryFollowUpState(index) : null;
    }

    function shouldShowFollowUps(summary) {
      const text = typeof summary === 'string' ? summary.trim() : '';
      return text.length > 0;
    }

    function renderFollowUpsHtml(summary, followUpState) {
      if (!shouldShowFollowUps(summary) || !followUpState) return '';
      const suggestions = normalizeFollowUps(followUpState.suggestions);
      const isLoading = !!followUpState.isLoading;
      const answerLoadingIndex = Number.isInteger(followUpState.answerLoadingIndex)
        ? followUpState.answerLoadingIndex
        : -1;
      const isAnswerLoading = isFollowUpAnswerLoading();
      const triggerLabel = isLoading ? labels.loadingFollowUps : labels.loadFollowUps;
      const icon = isLoading ? 'sync' : 'lightbulb';
      const triggerClass = isLoading
        ? 'notch-follow-up-trigger loading'
        : 'notch-follow-up-trigger';
      const errorHtml = followUpState.error
        ? `<div class="notch-follow-up-status"><span>${escapeHtml(followUpState.error)}</span></div>`
        : '';
      const suggestionsHtml = suggestions.length > 0
        ? `<div class="notch-follow-up-list">${suggestions.map(function(suggestion, index) {
            const isChipLoading = index === answerLoadingIndex;
            const chipClass = isChipLoading ? 'notch-follow-up-chip loading' : 'notch-follow-up-chip';
            const loadingIcon = isChipLoading ? '<span class="material-icons">sync</span>' : '';
            return `<button class="${chipClass}" type="button" data-follow-up-index="${index}" ${isAnswerLoading ? 'disabled' : ''}>${loadingIcon}<span>${escapeHtml(suggestion.text)}</span></button>`;
          }).join('')}</div>`
        : '';

      return `
          <div class="notch-follow-ups">
            <div class="notch-follow-up-header">
              <button class="${triggerClass}" type="button" data-follow-up-action="load" ${isLoading ? 'disabled' : ''}>
                <span class="material-icons">${icon}</span>
                <span>${escapeHtml(triggerLabel)}</span>
              </button>
            </div>
            ${errorHtml}
            ${suggestionsHtml}
          </div>`;
    }

    function renderSummaryContent(summary, followUpState) {
      return '<div class="notch-content">' + renderMarkdown(summary) + renderFollowUpsHtml(summary, followUpState) + '</div>';
    }

    function normalizeErrorActions(actions) {
      const source = Array.isArray(actions) ? actions : [];
      return source.map(function(action) {
        return {
          id: typeof action?.id === 'string' ? action.id : '',
          label: typeof action?.label === 'string' ? action.label : '',
          kind: action?.kind === 'primary' ? 'primary' : 'secondary',
          provider: typeof action?.provider === 'string' ? action.provider : '',
          url: typeof action?.url === 'string' ? action.url : '',
        };
      }).filter(function(action) {
        return action.id && action.label;
      });
    }

    function renderErrorContent(error, actionableError) {
      const details = actionableError && typeof actionableError === 'object'
        ? actionableError
        : null;
      renderedErrorActions = normalizeErrorActions(details?.actions);
      if (!details) {
        return `
          <div class="notch-error">
            <span class="material-icons icon">error_outline</span>
            <span>${escapeHtml(typeof error === 'string' ? error : labels.errorFallback)}</span>
          </div>`;
      }

      const actionsHtml = renderedErrorActions.length > 0
        ? `<div class="notch-actionable-error-actions">${renderedErrorActions.map(function(action, index) {
            const primaryClass = action.kind === 'primary' ? ' primary' : '';
            return `<button class="notch-error-action${primaryClass}" type="button" data-provider-error-action="${index}">${escapeHtml(action.label)}</button>`;
          }).join('')}</div>`
        : '';

      return `
        <div class="notch-content">
          <div class="notch-actionable-error">
            <div class="notch-actionable-error-header">
              <span class="material-icons">account_balance_wallet</span>
              <span class="notch-actionable-error-title">${escapeHtml(details.title || labels.errorFallback)}</span>
            </div>
            <div class="notch-actionable-error-message">${escapeHtml(details.message || error || labels.errorFallback)}</div>
            ${actionsHtml}
          </div>
        </div>`;
    }

    function renderHistoryItem(index) {
      renderedErrorActions = [];
      contentArea.innerHTML = renderSummaryContent(history[index], getHistoryFollowUpState(index));
      renderedMode = 'summary';
      renderedSummary = history[index] || '';
      applyFontScale();
      requestAnimationFrame(function() {
        updateExpandedHeight();
        restoreHistoryScroll(index);
      });
    }

    function refreshRenderedFollowUps(index) {
      if (!isRenderedHistoryItem(index)) return;
      const contentEl = getContentScroller();
      const scrollTop = contentEl ? contentEl.scrollTop || 0 : 0;
      const followUpsHtml = renderFollowUpsHtml(history[index], getHistoryFollowUpState(index));
      const followUpsEl = contentArea.querySelector('.notch-follow-ups');

      if (followUpsEl) {
        if (followUpsHtml) {
          followUpsEl.outerHTML = followUpsHtml;
        } else {
          followUpsEl.remove();
        }
      } else if (followUpsHtml && contentEl) {
        contentEl.insertAdjacentHTML('beforeend', followUpsHtml);
      }

      if (contentEl) {
        contentEl.scrollTop = scrollTop;
        historyScrollPositions[index] = scrollTop;
      }
      requestAnimationFrame(function() {
        updateExpandedHeight();
        if (contentEl) contentEl.scrollTop = scrollTop;
        updateContentFade();
      });
    }

    function applyFollowUpUpdate(data, fallbackSummary) {
      const targetSummary = typeof data.followUpsFor === 'string' && data.followUpsFor
        ? data.followUpsFor
        : fallbackSummary;
      const targetIndex = findHistoryIndexForSummary(targetSummary);
      if (targetIndex < 0) return -1;

      const followUpState = getHistoryFollowUpState(targetIndex);
      if (Object.prototype.hasOwnProperty.call(data, 'followUpsLoading')) {
        followUpState.isLoading = !!data.followUpsLoading;
      }
      if (Object.prototype.hasOwnProperty.call(data, 'followUps')) {
        followUpState.suggestions = normalizeFollowUps(data.followUps);
        followUpState.isLoading = false;
      }
      if (Object.prototype.hasOwnProperty.call(data, 'followUpsError')) {
        followUpState.error = data.followUpsError ? String(data.followUpsError) : null;
        if (data.followUpsError) {
          followUpState.isLoading = false;
        }
      } else if (Object.prototype.hasOwnProperty.call(data, 'followUps')) {
        followUpState.error = null;
      }

      return targetIndex;
    }

    function clearFollowUpAnswerLoading() {
      historyFollowUps.forEach(function(followUpState) {
        if (followUpState) {
          followUpState.answerLoadingIndex = -1;
        }
      });
    }

    function isFollowUpAnswerLoading() {
      return historyFollowUps.some(function(followUpState) {
        return followUpState && followUpState.answerLoadingIndex >= 0;
      });
    }

    function updateModeButtons() {
      modeButtons.forEach(function(button) {
        const isActive = button.dataset.mode === notchMode;
        button.classList.toggle('active', isActive);
        button.setAttribute('aria-checked', isActive ? 'true' : 'false');
      });
    }

    function renderPlaceholderHtml() {
      return `
        <div class="notch-placeholder">
          <span class="material-icons sparkle">auto_awesome</span>
          <span>${escapeHtml(labels.realtimeInsights)}</span>
        </div>`;
    }

    function renderLoadingHtml() {
      return `
        <div class="notch-loading">
          <span class="material-icons spinner">autorenew</span>
          <span>${escapeHtml(labels.generatingInsights)}</span>
        </div>`;
    }

    function updateCaptureIndicator(nextState) {
      const nextCaptureState = nextState || 'idle';
      notch.classList.toggle('capture-active', nextCaptureState !== 'idle');
      notch.classList.toggle('capture-analyzing', nextCaptureState === 'analyzing');
    }

    const settingsLabelKeys = [
      'notchMode',
      'modeOnlyQuestions',
      'modeModerate',
      'modeProactive',
      'modeFullPower',
      'responseLanguage',
      'notchTransparency',
      'transparencyLow',
      'transparencyHigh',
    ];

    let responseLanguage = 'disabled';
    let responseLanguageOptions = [
      { value: 'disabled', name: 'Disabled', flag: '', group: 'default' },
    ];

    function normalizeResponseLanguageOptions(options) {
      const source = Array.isArray(options) ? options : [];
      const normalized = source.map(function(option) {
        const value = typeof option.value === 'string' ? option.value : '';
        const name = typeof option.name === 'string' && option.name.trim()
          ? option.name
          : value;
        const flag = typeof option.flag === 'string' ? option.flag : '';
        const group = option.group === 'mostUsed' || option.group === 'allLanguages'
          ? option.group
          : 'default';
        return { value, name, flag, group };
      }).filter(function(option) {
        return option.value && option.name;
      });

      if (!normalized.some(function(option) { return option.value === 'disabled'; })) {
        normalized.unshift({ value: 'disabled', name: 'Disabled', flag: '', group: 'default' });
      }

      return normalized;
    }

    function normalizeResponseLanguage(value) {
      const nextValue = typeof value === 'string' && value ? value : 'disabled';
      return responseLanguageOptions.some(function(option) { return option.value === nextValue; })
        ? nextValue
        : 'disabled';
    }

    function appendResponseLanguageOption(parent, option) {
      const optionElement = document.createElement('option');
      optionElement.value = option.value;
      optionElement.textContent = (option.flag ? option.flag + ' ' : '') + option.name;
      parent.appendChild(optionElement);
    }

    function updateResponseLanguageSelect() {
      responseLanguageSelect.innerHTML = '';

      responseLanguageOptions
        .filter(function(option) { return option.group === 'default'; })
        .forEach(function(option) {
          appendResponseLanguageOption(responseLanguageSelect, option);
        });

      [
        { group: 'mostUsed', label: labels.responseLanguageMostUsed },
        { group: 'allLanguages', label: labels.responseLanguageAllLanguages },
      ].forEach(function(groupConfig) {
        const groupOptions = responseLanguageOptions.filter(function(option) {
          return option.group === groupConfig.group;
        });
        if (!groupOptions.length) return;

        const optgroup = document.createElement('optgroup');
        optgroup.label = groupConfig.label;
        groupOptions.forEach(function(option) {
          appendResponseLanguageOption(optgroup, option);
        });
        responseLanguageSelect.appendChild(optgroup);
      });

      responseLanguage = normalizeResponseLanguage(responseLanguage);
      responseLanguageSelect.value = responseLanguage;
      const selectedOption = responseLanguageOptions.find(function(option) {
        return option.value === responseLanguage;
      });
      responseLanguageSelect.title = selectedOption ? selectedOption.name : '';
    }

    function updateSettingsLabelReady() {
      const labelsReady = settingsLabelKeys.every(function(key) {
        return typeof labels[key] === 'string' && labels[key].trim().length > 0;
      });
      settingsPanel.classList.toggle('labels-ready', labelsReady);
      settingsControls.setAttribute('aria-hidden', labelsReady ? 'false' : 'true');
    }

    function applyLabelText() {
      document.getElementById('settings-mode-label').textContent = labels.notchMode;
      modeButtons.forEach(function(button) {
        const labelElement = button.querySelector('.notch-mode-text');
        const mode = button.dataset.mode;
        const labelByMode = {
          only_questions: labels.modeOnlyQuestions,
          moderate: labels.modeModerate,
          proactive: labels.modeProactive,
          full_power: labels.modeFullPower,
        };
        const label = labelByMode[mode] || mode;
        if (labelElement) labelElement.textContent = label;
        button.setAttribute('title', label);
        button.setAttribute('aria-label', label);
      });
      document.getElementById('settings-response-language-label').textContent = labels.responseLanguage;
      updateResponseLanguageSelect();
      document.getElementById('settings-transparency-label').textContent = labels.notchTransparency;
      document.getElementById('transparency-low-label').textContent = labels.transparencyLow;
      document.getElementById('transparency-high-label').textContent = labels.transparencyHigh;
      if (labels.resizeWidth) {
        resizeWidthHandle.setAttribute('title', labels.resizeWidth);
      } else {
        resizeWidthHandle.removeAttribute('title');
      }
      if (labels.resizeHeight) {
        resizeHeightHandle.setAttribute('title', labels.resizeHeight);
      } else {
        resizeHeightHandle.removeAttribute('title');
      }
      updateSettingsLabelReady();
      updateModeButtons();

        if (renderedMode === 'placeholder') {
          contentArea.innerHTML = renderPlaceholderHtml();
        } else if (renderedMode === 'loading') {
          contentArea.innerHTML = renderLoadingHtml();
        } else if (renderedMode === 'summary' && historyIndex >= 0) {
          renderHistoryItem(historyIndex);
        }
      }

    // Content-wrap: measure content and set height dynamically
    const PADDING_VERTICAL = 56; // 38px top + 18px bottom padding in .notch-inner
    const MAX_HEIGHT = 212;
    const COLLAPSED_HEIGHT = 34;
    const BTN_SPACE = 0; // footer controls are accounted for by the bottom safe area
    const SETTINGS_HEIGHT = 300; // fixed height for settings view, including footer safe area

    function getActivePanel() {
      return viewMode === 'settings' ? settingsPanel : contentArea;
    }

    let boundContentScroller = null;

    function getContentScroller() {
      return contentArea.querySelector('.notch-content');
    }

    function isRenderedHistoryItem(index) {
      return (
        index >= 0 &&
        renderedMode === 'summary' &&
        renderedSummary === history[index]
      );

    function saveCurrentHistoryScroll() {

    }

        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/(?<!\w)\*([^*]+)\*(?!\w)/g, '<em>$1</em>')
