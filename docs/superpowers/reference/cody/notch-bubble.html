    const CODE_LANGUAGE_ALIASES = {
      js: 'javascript',
      jsx: 'javascript',
      ts: 'typescript',
      tsx: 'typescript',
      py: 'python',
      python3: 'python',
      kt: 'kotlin',
      cpp: 'cpp',
      'c++': 'cpp',
      csharp: 'csharp',
      'c#': 'csharp',
      cs: 'csharp',
      golang: 'go',
      rs: 'rust',
      rb: 'ruby',
    };

    const CODE_LANGUAGE_LABELS = {
      c: 'C',
      cpp: 'C++',
      csharp: 'C#',
      dart: 'Dart',
      go: 'Go',
      java: 'Java',
      javascript: 'JavaScript',
      kotlin: 'Kotlin',
      php: 'PHP',
      python: 'Python',
      ruby: 'Ruby',
      rust: 'Rust',
      scala: 'Scala',
      swift: 'Swift',
      typescript: 'TypeScript',
    };

    function normalizeCodeLanguage(rawLanguage) {
      const token = String(rawLanguage || '').trim().split(/\s+/)[0] || '';
      if (!token || token.includes('<') || token.includes('>')) {
        return { id: '', label: '' };
      }
      const lower = token.toLowerCase();
      if (lower === 'language') {
        return { id: '', label: '' };
      }
      const normalized = CODE_LANGUAGE_ALIASES[lower] || lower;
      const id = normalized.replace(/[^a-z0-9_-]/g, '');
      if (!id) return { id: '', label: '' };
      return {
        id,
        label: CODE_LANGUAGE_LABELS[id] || token,
      };
    }

    function parseOpeningFenceInfo(rawInfo) {
      const info = String(rawInfo || '');
      const match = info.match(/^[ \t]*([A-Za-z0-9_+#.-]+)(?:[ \t]+([\s\S]*))?$/);
      if (!match) return { language: '', trailing: info };
      const lower = match[1].toLowerCase();
      const normalized = CODE_LANGUAGE_ALIASES[lower] || lower;
      const id = normalized.replace(/[^a-z0-9_-]/g, '');
      const hasKnownLanguage = Boolean(CODE_LANGUAGE_LABELS[id]);
      if (match[2] && !hasKnownLanguage) {
        return { language: '', trailing: info };
      }
      return {
        language: match[1],
        trailing: match[2] || '',
      };
    }

    function renderCodeBlock(codeLines, rawLanguage) {
      const language = flavorFeatures.fastFirstInsight
        ? normalizeCodeLanguage(rawLanguage)
        : { id: '', label: '' };
      const languageAttribute = language.label
        ? ` data-language="${escapeHtml(language.label)}"`
        : '';
      const preClass = language.label ? ' class="notch-code-block"' : '';
      const codeClass = language.id
        ? ` class="language-${escapeHtml(language.id)}"`
        : '';
      return `<pre${preClass}${languageAttribute}><code${codeClass}>${escapeHtml(codeLines.join('\n'))}</code></pre>`;
    }

    // Line-by-line markdown-to-HTML renderer
    // Block-level parsing is separated from inline formatting to avoid regex conflicts
    function renderMarkdown(text) {
      if (!text) return '';
      const lines = text.split('\n');
      let html = '';
      let inUl = false;
      let inOl = false;
      let inCodeBlock = false;
      let codeLines = [];
      let codeLanguage = '';

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // Fenced code block toggle (``` or ```language). Models often open
        // or close fences mid-line ("like this: ```python"), so fences are
        // detected anywhere in the line and the surrounding text is kept:
        // prose before an opening fence renders as a paragraph, text after
        // a fence is re-queued so the state machine consumes it next.
        const fenceIndex = line.indexOf('```');
        if (fenceIndex !== -1) {
          const beforeFence = line.slice(0, fenceIndex);
          const afterFence = line.slice(fenceIndex + 3);
          if (!inCodeBlock) {
            // Opening fence — close any open lists first
            if (inUl) { html += '</ul>'; inUl = false; }
            if (inOl) { html += '</ol>'; inOl = false; }
            if (beforeFence.trim()) {
              html += '<p>' + renderInline(beforeFence.trim()) + '</p>';
            }
            inCodeBlock = true;
            codeLines = [];
            const fenceInfo = parseOpeningFenceInfo(afterFence);
            codeLanguage = fenceInfo.language;
            if (fenceInfo.trailing.trim()) {
              lines.splice(i + 1, 0, fenceInfo.trailing);
            }
          } else {
            // Closing fence — emit the block
            if (beforeFence) codeLines.push(beforeFence);
            html += renderCodeBlock(codeLines, codeLanguage);
            inCodeBlock = false;
            codeLines = [];
            codeLanguage = '';
            if (afterFence.trim()) {
              lines.splice(i + 1, 0, afterFence);
            }
          }
          continue;
        }

        // Inside a fenced code block — collect raw lines (no formatting)
        if (inCodeBlock) {
          codeLines.push(line);
          continue;
        }

        const trimmed = line.trim();
        if (!trimmed) {
          if (inUl) { html += '</ul>'; inUl = false; }
          if (inOl) { html += '</ol>'; inOl = false; }
          continue;
        }

        // Unordered list item (- or *)
        const ulMatch = trimmed.match(/^[-*]\s+(.+)$/);
        if (ulMatch) {
          if (inOl) { html += '</ol>'; inOl = false; }
          if (!inUl) { html += '<ul>'; inUl = true; }
          html += '<li>' + renderInline(ulMatch[1]) + '</li>';
          continue;
        }

        // Ordered list item (1. 2. etc.)
        const olMatch = trimmed.match(/^\d+\.\s+(.+)$/);
        if (olMatch) {
          if (inUl) { html += '</ul>'; inUl = false; }
          if (!inOl) { html += '<ol>'; inOl = true; }
          html += '<li>' + renderInline(olMatch[1]) + '</li>';
          continue;
        }

        // Close any open list before other block elements
        if (inUl) { html += '</ul>'; inUl = false; }
        if (inOl) { html += '</ol>'; inOl = false; }

        // Headings
        const h3 = trimmed.match(/^###\s+(.+)$/);
        if (h3) { html += '<h3>' + renderInline(h3[1]) + '</h3>'; continue; }
        const h2 = trimmed.match(/^##\s+(.+)$/);
        if (h2) { html += '<h2>' + renderInline(h2[1]) + '</h2>'; continue; }
        const h1 = trimmed.match(/^#\s+(.+)$/);
        if (h1) { html += '<h1>' + renderInline(h1[1]) + '</h1>'; continue; }

        // Blockquote
        const bq = trimmed.match(/^>\s+(.+)$/);
        if (bq) { html += '<blockquote>' + renderInline(bq[1]) + '</blockquote>'; continue; }

        // Regular paragraph
        html += '<p>' + renderInline(trimmed) + '</p>';
      }

      // Close any open blocks at end of text
      if (inCodeBlock) {
        // Unclosed fence (streaming) — render what we have so far
        html += renderCodeBlock(codeLines, codeLanguage);
      }
      if (inUl) html += '</ul>';
      if (inOl) html += '</ol>';
      return html;
    }

    const PREVIEW_SUMMARY = `All right—this signals a transition into the next idea, so I can build from here by introducing the core concept, then layering in a concise example or code pattern if needed.

- This line checks that the fade appears only while more content continues below.

        // explicitly requested a refresh — otherwise they'd lose their reading
        // position while navigating back through older insights.
        const hasNewCompletedSummary = !isLoading && !error && hasRenderableSummary && summary !== history[history.length - 1];
        if (hasNewCompletedSummary) {
          const shouldJumpToLatest = wasViewingLatestBeforeUpdate || pendingRefreshJump || isFollowUpAnswerUpdate;
          history.push(summary);
          historyScrollPositions.push(0);
          historyFollowUps.push(createFollowUpState());
          if (shouldJumpToLatest) {
            historyIndex = history.length - 1;
          }
          pendingRefreshJump = false;
          updateNavUI();
        }

        // Only update displayed content when viewing the latest item
        if (isViewingLatest()) {
          let didRenderContent = false;
          if (error) {
            contentArea.innerHTML = renderErrorContent(error, actionableError);
            renderedMode = 'error';
            renderedSummary = '';
            didRenderContent = true;
          } else if (isLoading && !hasRenderableSummary) {
            renderedErrorActions = [];
            if (renderedMode !== 'loading') {
              contentArea.innerHTML = renderLoadingHtml();
              renderedMode = 'loading';
              renderedSummary = '';
              didRenderContent = true;
            }
          } else if (hasRenderableSummary) {
            renderedErrorActions = [];
            const shouldRerenderFollowUps = hasFollowUpUpdate && followUpTargetIndex === historyIndex;
            if (renderedMode !== 'summary' || renderedSummary !== summary || shouldRerenderFollowUps) {
              contentArea.innerHTML = renderSummaryContent(summary, getFollowUpStateForSummary(summary));
              renderedMode = 'summary';
              renderedSummary = summary;
              didRenderContent = true;
            }
          } else {
            // A realtime summary can validly complete with the idle protocol
            // ("..."). Treat that as "no new suggestion", not as an instruction
            // to erase a valid screen-selection or previous realtime insight.
            if (history.length > 0) {
              if (historyIndex < 0 || historyIndex >= history.length) {
                historyIndex = history.length - 1;
              }
              if (renderedMode !== 'summary' || renderedSummary !== history[historyIndex]) {
                renderHistoryItem(historyIndex);
                didRenderContent = true;
              }
            } else {
              renderedErrorActions = [];
              contentArea.innerHTML = renderPlaceholderHtml();
              renderedMode = 'placeholder';
              renderedSummary = '';
              didRenderContent = true;
            }
          }

          if (didRenderContent) {
            applyFontScale();
          }

          // Auto-scroll only if user is near the bottom (prevents jumps during streaming)
          if (didRenderContent) {
            requestAnimationFrame(() => {
              const contentEl = contentArea.querySelector('.notch-content');
              if (contentEl) {
                const distanceFromBottom = contentEl.scrollHeight - contentEl.scrollTop - contentEl.clientHeight;
                if (distanceFromBottom < 40) {
                  contentEl.scrollTop = contentEl.scrollHeight;
                }
              }
            });
          }
        }

        // Don't auto-expand when showing settings
        if (viewMode === 'settings') return;

        const hasAutoExpandableContent = Boolean(error || hasRenderableSummary);
        if (hasAutoExpandableContent) {
          initialSessionCollapsed = false;
        }

        const shouldRestoreCurrentScroll =
          viewMode === 'content' &&
          previousHistoryIndex === historyIndex &&
          !isViewingLatest();

        // Expand or update height based on current state
        // Only auto-expand if user hasn't manually collapsed and the initial
        // session placeholder has been replaced by real content.
        if (
          (state === 'collapsed' || state === 'collapsing') &&
          !userCollapsed &&
          (!initialSessionCollapsed || hasAutoExpandableContent)
        ) {
          showView('content');
          requestAnimationFrame(() => {
            expand();
          });
        } else if (state === 'expanded' && viewMode === 'content') {
          // Already expanded showing content → recalculate height for new content
          requestAnimationFrame(() => {
            updateExpandedHeight();
            if (shouldRestoreCurrentScroll) {
              restoreHistoryScroll(historyIndex);
            }
          });
        } else if (shouldRestoreCurrentScroll) {
          restoreHistoryScroll(historyIndex);
        }
      });

      // Listen for collapse signal from main process (e.g. recording stopped)
      window.notchAPI.onCollapse(() => {
        userCollapsed = false;
        initialSessionCollapsed = false;
        collapse();
      });

      // Listen for reset signal — clear all state from previous session
      window.notchAPI.onReset(() => {
        history.length = 0;
        historyScrollPositions.length = 0;
        historyFollowUps.length = 0;
        historyIndex = -1;
        pendingRefreshJump = false;
        userCollapsed = false;
        initialSessionCollapsed = true;
        viewMode = 'content';
        state = 'collapsed';
        notch.classList.remove('expanded', 'collapsing');
        notch.style.height = '';
        updateCaptureIndicator('idle');
        showView('content');
        contentArea.innerHTML = renderPlaceholderHtml();
        renderedMode = 'placeholder';
        renderedSummary = '';
        startNotchWindowShapeBurst(500);
        updateNavUI();
        stopRefreshSpin();
        // Snap back to notch position on reset
        pinned = true;
        updateFloatingClass();
        window.notchAPI.setPinned(true);
        window.notchAPI.getNotchPosition().then(function(pos) {
          notchOriginX = pos.x;
          notchOriginY = pos.y;
          window.notchAPI.moveWindow(notchOriginX, notchOriginY);
        });
      });

      window.notchAPI.onScrollShortcut((direction) => {
        if (direction === 'up' || direction === 'down') {
          scrollCurrentContent(direction);
        }
      });

      window.notchAPI.onHistoryShortcut((direction) => {
        if (direction === 'previous' || direction === 'next') {
          navigateHistory(direction);
        }
      });

      // Listen for settings updates from main app
      window.notchAPI.onSettingsUpdate((data) => {
        if (data.surfaceTheme !== undefined) {
          applySurfaceTheme(data.surfaceTheme);
        }
        if (data.fontScale !== undefined) {
          const parsed = parseFloat(data.fontScale);
          if (Number.isFinite(parsed)) {
            fontScale = Math.min(Math.max(parsed, 0.7), 1.6);
            try { localStorage.setItem('notchFontScale', fontScale.toString()); } catch (e) { /* ignore */ }
            applyFontScale();
            if (state === 'expanded' && viewMode === 'content') {
              requestAnimationFrame(function() { updateExpandedHeight(); });
            }
          }
        }
        if (data.mode !== undefined || data.notchMode !== undefined) {
          notchMode = normalizeNotchMode(data.mode !== undefined ? data.mode : data.notchMode);
          updateModeButtons();
        }
        if (data.responseLanguageOptions !== undefined) {
          responseLanguageOptions = normalizeResponseLanguageOptions(data.responseLanguageOptions);
          updateResponseLanguageSelect();
        }
        if (data.responseLanguage !== undefined) {
          responseLanguage = normalizeResponseLanguage(data.responseLanguage);
          updateResponseLanguageSelect();
        }
        // Update i18n labels if provided
        if (data.labels) {
          Object.keys(data.labels).forEach(function(key) {
            if (data.labels[key]) labels[key] = data.labels[key];
          });
          applyLabelText();
        }
      });

      window.notchAPI.requestSettings?.();
    } else {
      renderStandalonePreview();
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
