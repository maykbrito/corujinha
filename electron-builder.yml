appId: com.maykbrito.corujinha
productName: Corujinha
directories:
  output: dist
  buildResources: build

# electron-vite outputs the compiled app to out/. Ship that + package.json.
files:
  - out/**/*
  - package.json

# Rebuild native modules (better-sqlite3) against the packaged Electron.
# buildDependenciesFromSource forces compiling for Electron's ABI (148 for Electron 43)
# instead of grabbing a prebuilt Node-ABI (127) binary, which would crash on launch.
npmRebuild: true
buildDependenciesFromSource: true
asarUnpack:
  - "**/*.node"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  # Local/personal build: ad-hoc sign (identity: null), no notarization.
  # Gatekeeper will require right-click > Open the first launch.
  identity: null
  hardenedRuntime: false
  # Screen Recording is a TCC permission triggered at runtime (no Info.plist key needed).
  extendInfo:
    LSUIElement: true # agent app: no Dock icon (the notch is a floating companion window)
